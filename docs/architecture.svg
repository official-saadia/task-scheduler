<svg width="100%" viewBox="0 0 1210 870" role="img" xmlns="http://www.w3.org/2000/svg"><title>Task Scheduler Architecture</title><desc>Request path from React UI through controllers and services to MySQL, alongside a timer-driven scheduler, queue, executor and task handlers with SMTP, shell and filesystem dependencies.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="28" y="34" text-anchor="start" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="19" font-weight="700" fill="rgb(20,20,19)">Task Scheduler — Architecture</text><text x="28" y="56" text-anchor="start" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11" font-weight="400" fill="rgb(120,119,113)">Two independent entry points: user requests (left) and the timer-driven execution loop (right). They meet only at the database.  Dashed = external dependency.</text><rect x="28" y="78" width="330" height="460" rx="14" fill="none" stroke="rgb(200,198,190)" stroke-width="1" stroke-dasharray="2 4"/><text x="42" y="96" text-anchor="start" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11.5" font-weight="600" fill="rgb(130,129,122)">REQUEST PATH — user-driven</text><rect x="372" y="78" width="808" height="700" rx="14" fill="none" stroke="rgb(200,198,190)" stroke-width="1" stroke-dasharray="2 4"/><text x="386" y="96" text-anchor="start" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11.5" font-weight="600" fill="rgb(130,129,122)">EXECUTION PATH — timer-driven</text><rect x="58" y="108" width="270" height="46" rx="10" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="1"/><text x="193.0" y="123.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(68,68,65)">React + Vite UI</text><text x="193.0" y="141.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11" fill="rgb(68,68,65)" opacity="0.85">browser</text><path d="M193 156 L193 190" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/><text x="193" y="176" text-anchor="middle" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="10.5" fill="rgb(90,89,84)">REST /api/v1 · Bearer JWT</text><rect x="58" y="192" width="270" height="42" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/><text x="193.0" y="213.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(60,52,137)">JwtAuthenticationFilter</text><path d="M193 236 L193 262" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="58" y="264" width="270" height="52" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/><text x="193.0" y="282.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(60,52,137)">Controllers ×10</text><text x="193.0" y="300.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11" fill="rgb(60,52,137)" opacity="0.85">Task · Dlq · Analytics · Template · Smtp · …</text><path d="M193 318 L193 344" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="58" y="346" width="270" height="52" rx="10" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1"/><text x="193.0" y="364.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(8,80,65)">Services ×10</text><text x="193.0" y="382.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11" fill="rgb(8,80,65)" opacity="0.85">TaskService · DlqExportService · …</text><path d="M193 400 L193 426" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="58" y="428" width="270" height="42" rx="10" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1"/><text x="193.0" y="449.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(8,80,65)">Spring Data JPA repositories</text><text x="193" y="492" text-anchor="middle" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="10" font-weight="400" fill="rgb(120,119,113)">Auth: single admin from application.yml</text><text x="193" y="506" text-anchor="middle" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="10" font-weight="400" fill="rgb(120,119,113)">via CustomUserDetailsService — no users table</text><rect x="438" y="108" width="300" height="52" rx="10" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1"/><text x="588.0" y="126.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(99,56,6)">TaskSchedulerEngine</text><text x="588.0" y="144.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11" fill="rgb(99,56,6)" opacity="0.85">@Scheduled fixedDelay 10s</text><text x="588" y="172" text-anchor="middle" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="10" font-weight="400" fill="rgb(120,119,113)">findDueTasks(now)  ·  reads + advances tasks.next_execution_time</text><path d="M588 180 L588 208" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/><text x="630" y="199" text-anchor="middle" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="10.5" fill="rgb(90,89,84)">offer()</text><rect x="438" y="210" width="300" height="44" rx="10" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1"/><text x="588.0" y="224.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(99,56,6)">BoundedPriorityTaskQueue</text><text x="588.0" y="242.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11" fill="rgb(99,56,6)" opacity="0.85">capacity 500 · dedupes by task</text><path d="M588 256 L588 288" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/><text x="622" y="276" text-anchor="middle" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="10.5" fill="rgb(90,89,84)">poll()</text><rect x="438" y="290" width="300" height="52" rx="10" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1"/><text x="588.0" y="308.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(99,56,6)">TaskExecutorEngine</text><text x="588.0" y="326.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11" fill="rgb(99,56,6)" opacity="0.85">@Scheduled 10s · pool 5/10, queue 100</text><path d="M588 344 L588 376" fill="none" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="438" y="378" width="300" height="42" rx="10" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1"/><text x="588.0" y="399.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(99,56,6)">TaskHandlerRegistry</text><rect x="408" y="444" width="200" height="54" rx="10" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1"/><text x="508.0" y="463.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="13" font-weight="600" fill="rgb(99,56,6)">EmailNotification</text><text x="508.0" y="481.0" text-anchor="middle" dominant-baseline="central" font-family='&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif' font-size="11" fill="rgb(99,56,6)" opacity="0.85">Handler</text><rect x="628" y="444" width="200" height="54" rx="10" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width