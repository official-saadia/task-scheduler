spring:
  application:
    name: task-scheduler

  datasource:
    url: jdbc:mysql://localhost:3306/task_scheduler #?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}

  thread-pool:
    core-size: ${THREAD_POOL_CORE_SIZE:5}
    max-size: ${THREAD_POOL_MAX_SIZE:10}
    queue-capacity: ${THREAD_POOL_QUEUE_CAPACITY:100}

  scheduler:
    max-retries: ${SCHEDULER_MAX_RETRIES:3}
    retry-delay-ms: ${SCHEDULER_RETRY_DELAY_MS:5000}
    polling-interval-ms: ${SCHEDULER_POLLING_INTERVAL_MS:10000}
    retry-queue-poll-ms: ${SCHEDULER_RETRY_QUEUE_POLL_MS:1000}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true