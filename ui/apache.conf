ServerName localhost

# React Router serves deep links client-side, so a hard refresh on /tasks/5
# must return index.html rather than a 404 for a file that isn't there.
<Directory "/usr/local/apache2/htdocs">
    RewriteEngine On
    # Anything that isn't a real file or directory falls through to index.html.
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    # Leave the API alone — it's proxied below, not served from disk.
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteRule . /index.html [L]
</Directory>

# Proxy the API through Apache so the browser only ever talks to one origin.
# This is why CORS never fires: CorsConfig allows http://localhost:5173 and
# nothing else, so a browser hitting the backend directly on :8080 would be
# blocked. Same-origin sidesteps it, and is how you'd deploy this anyway.
ProxyPreserveHost On
ProxyPass        /api/v1/  http://backend:8080/api/v1/
ProxyPassReverse /api/v1/  http://backend:8080/api/v1/

# A wide-range XLSX export runs longer than the default proxy timeout.
ProxyTimeout 120
